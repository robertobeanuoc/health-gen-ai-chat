<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Gen AI Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      display: flex;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #sidebar-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #new-chat-btn {
      padding: 8px 12px;
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
      text-align: left;
    }

    #new-chat-btn:hover { background: #388bfd; }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      color: #c9d1d9;
      gap: 6px;
    }

    .session-item:hover { background: #21262d; }

    .session-item.active {
      background: #1f6feb22;
      color: #fff;
    }

    .session-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-delete {
      opacity: 0;
      background: none;
      border: none;
      color: #6e7681;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
    }

    .session-item:hover .session-delete { opacity: 1; }
    .session-delete:hover { color: #f97583; background: #3d1f1f; }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #30363d;
      font-size: 1rem;
      font-weight: 600;
      background: #161b22;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #session-name {
      color: #8b949e;
      font-size: 0.85rem;
      font-weight: 400;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #empty-state {
      margin: auto;
      text-align: center;
      color: #484f58;
    }

    #empty-state h2 { font-size: 1.1rem; margin-bottom: 6px; }
    #empty-state p  { font-size: 0.875rem; }

    .message {
      max-width: 760px;
      padding: 12px 16px;
      border-radius: 10px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user { white-space: pre-wrap; }

    .message.assistant p { margin: 0 0 10px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3 { margin: 14px 0 6px; font-size: 1em; color: #c9d1d9; }
    .message.assistant ul,
    .message.assistant ol { margin: 6px 0 10px; padding-left: 22px; }
    .message.assistant li { margin: 3px 0; }
    .message.assistant pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.assistant pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
    }
    .message.assistant table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
      font-size: 0.88em;
    }
    .message.assistant th,
    .message.assistant td {
      border: 1px solid #30363d;
      padding: 6px 10px;
      text-align: left;
    }
    .message.assistant th { background: #161b22; color: #c9d1d9; }
    .message.assistant blockquote {
      border-left: 3px solid #30363d;
      margin: 8px 0;
      padding: 4px 12px;
      color: #8b949e;
    }

    .message.user {
      background: #1f6feb33;
      border: 1px solid #1f6feb66;
      align-self: flex-end;
    }

    .message.assistant {
      background: #21262d;
      border: 1px solid #30363d;
      align-self: flex-start;
    }

    .message.assistant .chart-container {
      margin-top: 14px;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
    }

    .message.assistant .chart-container iframe {
      display: block;
      width: 100%;
      height: 640px;
      border: none;
    }

    .message.error {
      background: #3d1f1f;
      border: 1px solid #6e3030;
      align-self: flex-start;
      color: #f97583;
    }

    .thinking {
      font-style: italic;
      color: #8b949e;
      font-size: 0.85rem;
      align-self: flex-start;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid #30363d;
      background: #161b22;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 0.95rem;
      resize: none;
      min-height: 44px;
      max-height: 180px;
      outline: none;
    }

    #user-input:focus { border-color: #1f6feb; }
    #user-input:disabled { opacity: 0.5; }

    #send-btn {
      padding: 10px 20px;
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      align-self: flex-end;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { background: #388bfd; }

    code {
      background: #0d1117;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 0.88em;
    }

    /* ── Sidebar toggle (mobile) ── */
    #sidebar-toggle {
      display: none;
      background: none;
      border: none;
      color: #e1e4e8;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      line-height: 1;
      flex-shrink: 0;
    }

    #sidebar-toggle:hover { background: #21262d; }

    /* ── Overlay (mobile) ── */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 99;
    }

    #sidebar-overlay.visible { display: block; }

    /* ── Responsive: tablet ── */
    @media (max-width: 900px) {
      #sidebar { width: 220px; min-width: 220px; }
    }

    /* ── Responsive: mobile ── */
    @media (max-width: 680px) {
      #sidebar-toggle { display: block; }

      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.24s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.45);
        width: 260px;
        min-width: 0;
      }

      #sidebar.open { transform: translateX(0); }

      .message { max-width: 92%; }

      #chat-window { padding: 12px; gap: 12px; }

      #input-area { padding: 10px 12px; gap: 8px; }

      #send-btn { padding: 10px 14px; font-size: 0.9rem; }

      header { padding: 12px 14px; font-size: 0.95rem; }
    }

    @media (max-width: 400px) {
      #input-area { flex-direction: column; }
      #send-btn { align-self: flex-end; }
    }
  </style>
</head>
<body>

<div id="sidebar-overlay"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-header">
    <span id="sidebar-title">Sessions</span>
    <button id="new-chat-btn">+ New chat</button>
  </div>
  <div id="session-list"></div>
</aside>

<!-- Main -->
<div id="main">
  <header>
    <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
    🩺 Health Gen AI Chat
    <span id="session-name"></span>
  </header>

  <div id="chat-window">
    <div id="empty-state">
      <h2>No session selected</h2>
      <p>Create a new chat or pick one from the sidebar.</p>
    </div>
  </div>

  <div id="input-area">
    <textarea
      id="user-input"
      placeholder="Ask about your health data… (Shift+Enter for newline)"
      rows="1"
      disabled
    ></textarea>
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
  marked.use({ gfm: true, breaks: false });

  // Base URL of the Streamlit dashboard renderer (src/chat_agent/streamlit_dashboard.py).
  const STREAMLIT_URL = "http://localhost:8501";

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  let currentSessionId = null;

  const sessionList  = document.getElementById("session-list");
  const chatWindow   = document.getElementById("chat-window");
  const emptyState   = document.getElementById("empty-state");
  const userInput    = document.getElementById("user-input");
  const sendBtn      = document.getElementById("send-btn");
  const sessionName  = document.getElementById("session-name");

  // ---------------------------------------------------------------------------
  // Session API
  // ---------------------------------------------------------------------------

  async function apiListSessions() {
    const res = await fetch("/api/sessions");
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function apiCreateSession() {
    const res = await fetch("/api/sessions", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function apiGetSession(id) {
    const res = await fetch(`/api/sessions/${id}`);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function apiDeleteSession(id) {
    const res = await fetch(`/api/sessions/${id}`, { method: "DELETE" });
    if (!res.ok) throw new Error(await res.text());
  }

  async function apiChat(sessionId, content) {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, content }),
    });
    if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
    return res.json();
  }

  // ---------------------------------------------------------------------------
  // Sidebar rendering
  // ---------------------------------------------------------------------------

  async function refreshSidebar() {
    const sessions = await apiListSessions().catch(() => []);
    sessionList.innerHTML = "";
    for (const s of sessions) {
      const item = document.createElement("div");
      item.className = "session-item" + (s.id === currentSessionId ? " active" : "");
      item.dataset.id = s.id;

      const title = document.createElement("span");
      title.className = "session-title";
      title.textContent = s.title || "New chat";

      const del = document.createElement("button");
      del.className = "session-delete";
      del.title = "Delete";
      del.textContent = "✕";
      del.addEventListener("click", async (e) => {
        e.stopPropagation();
        if (!confirm(`Delete "${title.textContent}"?`)) return;
        await apiDeleteSession(s.id).catch(console.error);
        if (currentSessionId === s.id) clearChat();
        await refreshSidebar();
      });

      item.appendChild(title);
      item.appendChild(del);
      item.addEventListener("click", () => loadSession(s.id));
      sessionList.appendChild(item);
    }
  }

  // ---------------------------------------------------------------------------
  // Chat rendering
  // ---------------------------------------------------------------------------

  function scrollBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function appendMessage(role, text, dashboard = null, messageId = null) {
    emptyState.style.display = "none";
    const div = document.createElement("div");
    div.className = `message ${role}`;
    if (role === "assistant") {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }

    // A dashboard is rendered by a dedicated Streamlit iframe scoped to this
    // message's id, so a session can accumulate any number of dashboards —
    // each assistant message gets its own.
    if (dashboard && messageId) {
      const chartDiv = document.createElement("div");
      chartDiv.className = "chart-container";
      const iframe = document.createElement("iframe");
      iframe.src = `${STREAMLIT_URL}/?embed=true&message_id=${encodeURIComponent(messageId)}`;
      chartDiv.appendChild(iframe);
      div.appendChild(chartDiv);
    }

    chatWindow.appendChild(div);
    scrollBottom();
    return div;
  }

  function clearChat() {
    currentSessionId = null;
    sessionName.textContent = "";
    chatWindow.innerHTML = "";
    chatWindow.appendChild(emptyState);
    emptyState.style.display = "";
    userInput.disabled = true;
    sendBtn.disabled = true;
  }

  async function loadSession(id) {
    const data = await apiGetSession(id).catch(err => { console.error(err); return null; });
    if (!data) return;

    currentSessionId = id;
    sessionName.textContent = data.title || "New chat";
    chatWindow.innerHTML = "";
    emptyState.style.display = "none";

    for (const msg of data.messages) {
      appendMessage(msg.role, msg.content, msg.dashboard ?? null, msg.id);
    }

    if (data.messages.length === 0) {
      chatWindow.appendChild(emptyState);
      emptyState.style.display = "";
    }

    userInput.disabled = false;
    sendBtn.disabled = false;
    userInput.focus();

    await refreshSidebar();
    scrollBottom();

    if (window.innerWidth <= 680) closeSidebar();
  }

  // ---------------------------------------------------------------------------
  // Send message
  // ---------------------------------------------------------------------------

  async function sendMessage() {
    const content = userInput.value.trim();
    if (!content || !currentSessionId) return;

    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;
    userInput.disabled = true;

    appendMessage("user", content);

    const thinking = document.createElement("div");
    thinking.className = "thinking";
    thinking.textContent = "Thinking…";
    chatWindow.appendChild(thinking);
    scrollBottom();

    try {
      const data = await apiChat(currentSessionId, content);
      chatWindow.removeChild(thinking);

      const reply = data.reply ?? "";
      appendMessage("assistant", reply || "(no text response)", data.dashboard ?? null, data.message_id ?? null);

      // Update sidebar title if this was the first message
      await refreshSidebar();

    } catch (err) {
      chatWindow.removeChild(thinking);
      appendMessage("error", `Error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }
  }

  // ---------------------------------------------------------------------------
  // Event listeners
  // ---------------------------------------------------------------------------

  document.getElementById("new-chat-btn").addEventListener("click", async () => {
    const session = await apiCreateSession().catch(err => { console.error(err); return null; });
    if (!session) return;
    await refreshSidebar();
    await loadSession(session.id);
  });

  sendBtn.addEventListener("click", sendMessage);

  userInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 180) + "px";
  });

  // ---------------------------------------------------------------------------
  // Sidebar drawer (mobile)
  // ---------------------------------------------------------------------------

  const sidebar        = document.getElementById("sidebar");
  const sidebarOverlay = document.getElementById("sidebar-overlay");
  const sidebarToggle  = document.getElementById("sidebar-toggle");

  function openSidebar() {
    sidebar.classList.add("open");
    sidebarOverlay.classList.add("visible");
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    sidebarOverlay.classList.remove("visible");
  }

  sidebarToggle.addEventListener("click", () => {
    sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
  });

  sidebarOverlay.addEventListener("click", closeSidebar);

  // ---------------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------------

  refreshSidebar();
</script>

</body>
</html>
