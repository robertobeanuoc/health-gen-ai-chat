services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8888:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      - app
    ports:
      - "8501:8501"
    environment:
      - CHAT_API_BASE_URL=http://app:8000
    entrypoint: []
    command: ["uv", "run", "streamlit", "run", "src/chat_agent/streamlit_dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
