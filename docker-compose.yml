services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8888:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MYSQL_ALCHEMY_URI=${MYSQL_ALCHEMY_URI}
      - DBT_MANIFEST_PATH=${DBT_MANIFEST_PATH}
      - DBT_PROJECT_PATH=${DBT_PROJECT_PATH}
