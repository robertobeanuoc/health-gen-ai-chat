services:
  trino:
    image: trinodb/trino:latest
    container_name: trino-coordinator
    ports:
      - "8080:8080"
    volumes:
      # Inyecta el directorio local 'catalog' en el contenedor
      - ./catalog:/etc/trino/catalog:ro
    environment:
      # Opcional: Ajustes de memoria para la JVM de Trino
      - JAVA_TOOL_OPTIONS=-Xmx2G
      - DB_HOST_STRAVA=${DB_HOST_STRAVA}
      - DB_PORT_STRAVA=${DB_PORT_STRAVA}
      - DB_NAME_STRAVA=${DB_NAME_STRAVA}
      - DB_USER_STRAVA=${DB_USER_STRAVA}
      - DB_PASSWORD_STRAVA=${DB_PASSWORD_STRAVA}
      - DB_HOST_ABBOT=${DB_HOST_ABBOT}
      - DB_PORT_ABBOT=${DB_PORT_ABBOT}
      - DB_NAME_ABBOT=${DB_NAME_ABBOT}
      - DB_USER_ABBOT=${DB_USER_ABBOT}
      - DB_PASSWORD_ABBOT=${DB_PASSWORD_ABBOT}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5