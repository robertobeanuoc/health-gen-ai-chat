
version: 2

sources:
  - name: abbot
    schema: cgm_abbot_connector
    tables:
      - name: glucose_register
        columns:
          - name: uuid
            description: "The unique identifier for each record"
            type: string
          - name: row_created_at
            description: "The identifier for the patient"
          - name: timestamp
            description: "The timestamp of the glucose measurement"
            type: datetime
          - name: glucose_value
            description: "The glucose level measurement"
            type: double
          - name: sensor_scan
            description: "Indicates whether the glucose value was obtained through a sensor scan (1) or not (0)"
            type: tinyint
            
  - name: strava
    schema: "strava-to-db"
    tables:
      - name: strava_activities
        columns:
          - name: activity_id
            description: "The unique identifier for each record"
            type: int
          - name: name
            description: "The name of the activity"
            type: string
          - name: activity_type
            description: "The type of activity (e.g., run, ride, swim)"
            type: string
          - name: sport_type
            description: "The sport type of the activity"
            type: string
          - name: start_date
            description: "The start date and time of the activity"
            type: datetime
          - name: start_date_local
            description: "The local start date and time of the activity"
            type: datetime
          - name: distance_m
            description: "The distance covered during the activity (in meters)"
            type: double
          - name: moving_time_s
            description: "The moving time of the activity (in seconds)"
            type: int
          - name: elapsed_time_s
            description: "The elapsed time of the activity (in seconds)"
            type: int
          - name: total_elevation_gain_m
            description: "The total elevation gain during the activity (in meters)"
            type: double
