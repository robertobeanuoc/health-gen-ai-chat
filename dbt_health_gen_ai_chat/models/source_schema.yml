
version: 2

sources:
  - name: abbot
    schema: cgm_abbot_connector
    tables:
      - name: glucose_register
        columns:
          - name: uuid
            description: "The unique identifier for each record"
            type: string
          - name: timestamp
            description: "The timestamp of the glucose measurement"
            type: datetime
          - name: glucose_value
            description: "The glucose level measurement"
            type: double
          - name: sensor_scan
            description: "Indicates whether the glucose value was obtained through a sensor scan (1) or not (0)"
            type: tinyint
      - name: insulin_register
        columns:
          - name: uuid
            description: "The unique identifier for each record"
            type: string
          - name: timestamp
            description: "The timestamp of the insulin measurement"
          - name: timestamp_year
            description: "The year of the timestamp"
          - name: timestamp_month
            description: "The month of the timestamp"
          - name: timestamp_day
            description: "The day of the timestamp"
          - name: timestamp_hour
            description: "The hour of the timestamp"
            type: int
          - name: insulin_value
            description: "The insulin level measurement"
            type: double
          - name: is_rapid
            description: "Indicates whether the insulin is rapid-acting (1) or not (0)"
            type: tinyint

  - name: strava
    schema: "strava-to-db"
    tables:
      - name: strava_activities
        columns:
          - name: activity_id
            description: "The unique identifier for each record"
            type: int
          - name: name
            description: "The name of the activity"
            type: string
          - name: activity_type
            description: "The type of activity (e.g., run, ride, swim)"
            type: string
          - name: sport_type
            description: "The sport type of the activity"
            type: string
          - name: start_date
            description: "The start date and time of the activity"
            type: datetime
          - name: start_date_local
            description: "The local start date and time of the activity"
            type: datetime
          - name: distance_m
            description: "The distance covered during the activity (in meters)"
            type: double
          - name: moving_time_s
            description: "The moving time of the activity (in seconds)"
            type: int
          - name: elapsed_time_s
            description: "The elapsed time of the activity (in seconds)"
            type: int
          - name: total_elevation_gain_m
            description: "The total elevation gain during the activity (in meters)"
            type: double
  - name: food
    schema: food_recognition
    tables:
      - name: food_register
        columns:
          - name: uuid  
            description: "The unique identifier for each record"
            type: string
          - name: file_uid
            description: "The unique identifier for the file"
            type: string
          - name: food_type
            description: "The type of food"
            type: string
          - name: glycemic_index
            description: "The glycemic index of the food"
            type: int
          - name: weight_grams
            description: "The weight of the food in grams"
            type: int
          - name: carbohydrate_percentage
            description: "The percentage of carbohydrates in the food"
            type: decimal
          - name: carbohydrate_weight_grams
            description: "The weight of carbohydrates in grams"
            type: decimal
          - name: absorption_type
            description: "The type of absorption (e.g., fast, slow)"
            type: string
          
